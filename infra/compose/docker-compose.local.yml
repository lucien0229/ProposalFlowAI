services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: proposalflow
      POSTGRES_PASSWORD: proposalflow
      POSTGRES_USER: proposalflow
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proposalflow -d proposalflow"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  minio:
    image: minio/minio:latest
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_PASSWORD: proposalflow
      MINIO_ROOT_USER: proposalflow
    profiles:
      - storage
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

volumes:
  minio-data: {}
  postgres-data: {}
  redis-data: {}
